<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News – RightSpot Ltd</title>
  <link rel="icon" href="images/cropped-RightSpotFB-32x32.png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .page-header {
      background: linear-gradient(135deg, var(--green-600) 0%, var(--green-500) 100%);
      color: var(--white);
      padding: 4rem 0;
      text-align: center;
      animation: slideDown 0.6s ease-out;
    }
    .page-header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1.125rem; opacity: 0.95; }

    .news-container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    .news-list { display: grid; grid-template-columns: 1fr; gap: 2rem; margin: 3rem 0; }
    .news-item {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 2rem; box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation: fadeInUp 0.6s ease-out backwards;
      border-left: 4px solid var(--green-500);
    }
    .news-item:nth-child(1) { animation-delay: 0.1s; }
    .news-item:nth-child(2) { animation-delay: 0.2s; }
    .news-item:nth-child(3) { animation-delay: 0.3s; }
    .news-item:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-left-color: var(--green-600);
    }
    .news-date { font-size: 0.875rem; color: var(--neutral-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .news-item h2 { font-size: 1.5rem; color: var(--neutral-900); margin-bottom: 0.75rem; line-height: 1.4; }
    .news-item p { font-size: 1rem; color: var(--neutral-700); line-height: 1.8; margin-bottom: 1rem; }
    .news-empty { text-align: center; padding: 3rem; color: var(--neutral-500); }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="page-header">
    <div class="container">
      <h1>News & Updates</h1>
      <p>Latest news and releases from RightSpot Ltd</p>
    </div>
  </div>

  <div class="container news-container">
    <div class="news-list" id="newsList">
      <p style="text-align:center;color:var(--neutral-500);">Loading news...</p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script type="module">
  import { renderHeader, renderFooter, initMobileMenu, initBackToTop, setActiveNav } from './js/shared-layout.js';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  document.getElementById('header-placeholder').innerHTML = renderHeader();
  document.getElementById('footer-placeholder').innerHTML = renderFooter();
  initMobileMenu();
  initBackToTop();
  setActiveNav('news.html');

  const SUPABASE_URL = 'https://ekdwrwhsmurwtctctbal.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZHdyd2hzbXVyd3RjdGN0YmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjA4MjYsImV4cCI6MjA5NjA5NjgyNn0.30oEuPagsWJV-ShYnb8UTVx0X93pug4DLcOklXEcZGc';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadNews() {
    const list = document.getElementById('newsList');
    try {
      const { data } = await supabase.from('news_posts').select('*').eq('is_published', true).order('published_at', { ascending: false });
      if (!data?.length) {
        list.innerHTML = '<div class="news-empty"><p>No news posts yet.</p></div>';
        return;
      }
      list.innerHTML = data.map(post => {
        const date = new Date(post.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        return `
          <article class="news-item">
            <div class="news-date">${date}</div>
            <h2>${escHtml(post.title)}</h2>
            <p>${escHtml(post.content)}</p>
          </article>`;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="news-empty"><p>Error loading news.</p></div>';
    }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  loadNews();
</script>
</body>
</html>
