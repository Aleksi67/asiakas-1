<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Software Products – RightSpot Ltd</title>
  <link rel="icon" href="images/cropped-RightSpotFB-32x32.png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .page-header {
      background: linear-gradient(135deg, var(--green-600) 0%, var(--green-500) 100%);
      color: var(--white);
      padding: 4rem 0;
      text-align: center;
      animation: slideDown 0.6s ease-out;
    }
    .page-header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1.125rem; opacity: 0.95; }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin: 3rem 0; }
    .product-card {
      background: var(--white); border-radius: var(--radius-lg);
      overflow: hidden; box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation: fadeInUp 0.6s ease-out backwards;
    }
    .product-card:nth-child(1) { animation-delay: 0.1s; }
    .product-card:nth-child(2) { animation-delay: 0.2s; }
    .product-card:nth-child(3) { animation-delay: 0.3s; }
    .product-card:nth-child(4) { animation-delay: 0.4s; }
    .product-card:nth-child(5) { animation-delay: 0.5s; }
    .product-card:nth-child(6) { animation-delay: 0.6s; }
    .product-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: var(--shadow-lg);
    }
    .product-header {
      background: linear-gradient(135deg, var(--green-50) 0%, var(--green-100) 100%);
      padding: 2rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .product-header h3 { font-size: 1.25rem; color: var(--green-600); font-weight: 700; }
    .product-body { padding: 1.5rem; }
    .product-body p { font-size: 0.875rem; color: var(--neutral-600); line-height: 1.7; margin-bottom: 1rem; }
    .product-platform { display: inline-block; background: var(--green-50); color: var(--green-600); font-size: 0.75rem; font-weight: 600; padding: 0.375rem 0.75rem; border-radius: 999px; margin-bottom: 1rem; }
    .product-link {
      display: inline-block;
      background: var(--green-500); color: var(--white);
      padding: 0.625rem 1.25rem; border-radius: var(--radius);
      font-weight: 600; font-size: 0.875rem;
      transition: all 0.2s;
      text-align: center;
    }
    .product-link:hover { background: var(--green-600); transform: translateX(4px); }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="page-header">
    <div class="container">
      <h1>Software Products</h1>
      <p>Our published applications and solutions</p>
    </div>
  </div>

  <div class="container" style="max-width:1200px;">
    <div class="products-grid" id="productsGrid">
      <p style="text-align:center;color:var(--neutral-500);grid-column:1/-1;">Loading products...</p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script type="module">
  import { renderHeader, renderFooter, initMobileMenu, initBackToTop, setActiveNav } from './js/shared-layout.js';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  document.getElementById('header-placeholder').innerHTML = renderHeader();
  document.getElementById('footer-placeholder').innerHTML = renderFooter();
  initMobileMenu();
  initBackToTop();
  setActiveNav('products.html');

  const SUPABASE_URL = 'https://ekdwrwhsmurwtctctbal.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZHdyd2hzbXVyd3RjdGN0YmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjA4MjYsImV4cCI6MjA5NjA5NjgyNn0.30oEuPagsWJV-ShYnb8UTVx0X93pug4DLcOklXEcZGc';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadProducts() {
    const grid = document.getElementById('productsGrid');
    try {
      const { data } = await supabase.from('software_products').select('*').eq('is_active', true).order('sort_order').order('created_at');
      if (!data?.length) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--neutral-500);">No products available.</p>';
        return;
      }
      grid.innerHTML = data.map(p => `
        <article class="product-card">
          <div class="product-header">
            <h3>${escHtml(p.name)}</h3>
          </div>
          <div class="product-body">
            <div class="product-platform">${escHtml(p.platform)}</div>
            <p>${escHtml(p.description)}</p>
            ${p.store_url ? `<a href="${escHtml(p.store_url)}" class="product-link" target="_blank" rel="noreferrer">Learn More</a>` : ''}
          </div>
        </article>`).join('');
    } catch (e) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--neutral-500);">Error loading products.</p>';
    }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
  }

  loadProducts();
</script>
</body>
</html>
