<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – RightSpot Ltd</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-50: #f0faf3;
      --green-500: #279149;
      --green-600: #1f7a3c;
      --neutral-50: #f8f9fa;
      --neutral-100: #f1f3f5;
      --neutral-600: #6c757d;
      --neutral-700: #495057;
      --neutral-900: #212529;
      --white: #ffffff;
      --shadow-md: 0 10px 15px rgba(0,0,0,0.07), 0 4px 6px rgba(0,0,0,0.05);
      --radius: 8px;
      --radius-xl: 16px;
      font-size: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--neutral-900);
      background: var(--neutral-100);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .login-container {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo img {
      height: 56px;
      width: auto;
      margin: 0 auto 1.5rem;
    }

    .login-container h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--neutral-900);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .login-container p {
      font-size: 0.9375rem;
      color: var(--neutral-600);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--neutral-900);
    }

    .form-group input {
      padding: 0.75rem 1rem;
      border: 1px solid #e9ecef;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--green-500);
      box-shadow: 0 0 0 3px var(--green-50);
    }

    .form-group input::placeholder {
      color: var(--neutral-600);
    }

    .error-message {
      padding: 1rem;
      background: #fee;
      border: 1px solid #fcc;
      border-radius: var(--radius);
      color: #c33;
      font-size: 0.875rem;
      display: none;
      margin-bottom: 1rem;
    }

    .error-message.show {
      display: block;
    }

    .btn {
      padding: 0.875rem 1.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--green-500);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--green-600);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:disabled {
      background: var(--neutral-600);
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      font-size: 0.875rem;
      color: var(--green-500);
      font-weight: 600;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: var(--green-600);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 2rem 1.5rem;
      }

      .login-container h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="/assets/rightspot_logo-e1423440880466-1-BtU07ddH.png" alt="RightSpot">
      <h1>Admin Panel</h1>
      <p>Sign in to manage your website</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Sign In
      </button>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to website</a>
    </div>
  </div>

  <script>
    // Supabase configuration
    const SUPABASE_URL = 'https://ekdwrwhsmurwtctctbal.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZHdyd2hzbXVyd3RjdGN0YmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjA4MjYsImV4cCI6MjA5NjA5NjgyNn0.30oEuPagsWJV-ShYnb8UTVx0X93pug4DLcOklXEcZGc';

    // Initialize Supabase client
    class SupabaseClient {
      constructor(url, anonKey) {
        this.url = url;
        this.anonKey = anonKey;
      }

      async signInWithPassword(email, password) {
        const response = await fetch(`${this.url}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': this.anonKey,
          },
          body: JSON.stringify({
            email: email,
            password: password,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error_description || 'Authentication failed');
        }

        return data;
      }

      async getSession() {
        const token = localStorage.getItem('supabase_token');
        if (!token) return null;

        const response = await fetch(`${this.url}/auth/v1/user`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'apikey': this.anonKey,
          },
        });

        if (!response.ok) {
          localStorage.removeItem('supabase_token');
          return null;
        }

        return await response.json();
      }
    }

    const supabase = new SupabaseClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Check if user already has a session
    document.addEventListener('DOMContentLoaded', async () => {
      const session = await supabase.getSession();
      if (session) {
        window.location.href = 'admin.html';
      }
    });

    // Handle form submission
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Clear error message
      errorMessage.classList.remove('show');
      errorMessage.textContent = '';

      // Show loading state
      submitBtn.disabled = true;
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const response = await supabase.signInWithPassword(email, password);

        // Save token to localStorage
        localStorage.setItem('supabase_token', response.access_token);

        // Redirect to admin dashboard
        window.location.href = 'admin.html';
      } catch (error) {
        // Show error message
        errorMessage.textContent = error.message || 'Invalid email or password. Please try again.';
        errorMessage.classList.add('show');

        // Reset button state
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;

        // Clear password field
        passwordInput.value = '';
      }
    });
  </script>
</body>
</html>
